<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeNeX Chats</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#000;
    --text:white;
    --nav:#0b0b0b;
    --card:#101010;
    --card2:#151515;
    --border:#222;
    --green:#39ff14;
    --muted:#aaa;
}

body.light-mode{
    --bg:#f4f4f4;
    --text:#111;
    --nav:#ffffff;
    --card:#ffffff;
    --card2:#f7f7f7;
    --border:#ddd;
    --green:#39ff14;
    --muted:#555;
}

body{
    height:100vh;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.navbar{
    height:78px;
    background:var(--nav);
    border-bottom:1px solid var(--green);
    display:flex;
    align-items:center;
    padding:0 55px;
}

.logo{
    color:var(--green);
    font-size:34px;
    font-weight:900;
    text-decoration:none;
}

.chat-page{
    height:calc(100vh - 78px);
    display:grid;
    grid-template-columns:390px 1fr;
}

.chat-list{
    background:var(--card);
    border-right:1px solid var(--border);
    overflow-y:auto;
}

.chat-title{
    padding:22px;
    font-size:30px;
    color:var(--green);
}

.search{
    margin:0 18px 15px;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:25px;
    background:var(--card2);
    color:var(--text);
    font-size:15px;
    border:1px solid var(--border);
}

.chat-user{
    display:flex;
    gap:14px;
    padding:16px 18px;
    cursor:pointer;
    border-bottom:1px solid var(--border);
    align-items:center;
}

.chat-user:hover,
.chat-user.active{
    background:var(--card2);
}

.chat-user img{
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid var(--green);
    object-fit:cover;
}

.profile-link{
    display:flex;
}

.chat-info{
    flex:1;
}

.chat-info h3{
    font-size:17px;
    color:var(--text);
    margin-bottom:5px;
}

.chat-info p{
    color:var(--muted);
    font-size:14px;
}

.small-time{
    color:var(--muted);
    font-size:12px;
}

.chat-box{
    display:flex;
    flex-direction:column;
    background:#090909;
}

body.light-mode .chat-box{
    background:#f4f4f4;
}

.chat-header{
    height:75px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    position:relative;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.back-btn{
    display:none;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:22px;
    cursor:pointer;
}

.profile{
    display:flex;
    align-items:center;
    gap:14px;
}

.profile img{
    width:50px;
    height:50px;
    border-radius:50%;
    border:2px solid var(--green);
    object-fit:cover;
}

.profile h3{
    color:var(--green);
    font-size:20px;
}

.profile p{
    color:var(--muted);
    font-size:13px;
    margin-top:3px;
}

.header-icons{
    display:flex;
    gap:22px;
    font-size:25px;
    color:var(--green);
}

.header-icons span{
    cursor:pointer;
}

.search-tab,
.more-tab{
    position:absolute;
    top:68px;
    right:20px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:16px;
    display:none;
    z-index:100;
    overflow:hidden;
}

.search-tab{
    width:280px;
    padding:15px;
}

.search-tab p{
    color:var(--muted);
    margin-bottom:10px;
    font-size:14px;
}

.search-tab input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:14px;
    background:var(--bg);
    color:var(--text);
    border:1px solid var(--border);
}

.more-tab{
    width:160px;
}

.more-tab p{
    padding:14px 18px;
    cursor:pointer;
    border-bottom:1px solid var(--border);
    color:var(--text);
}

.more-tab p:hover{
    background:var(--green);
    color:black;
}

.messages{
    flex:1;
    padding:24px;
    overflow-y:auto;
    background:
    linear-gradient(rgba(0,0,0,0.88),rgba(0,0,0,0.88)),
    url("https://i.pinimg.com/736x/86/18/52/86185237b4cc75cc1fef6b6d22af22f9.jpg");
    background-size:300px;
}

body.light-mode .messages{
    background:#f4f4f4;
}

.date-line{
    width:max-content;
    margin:10px auto 20px;
    background:var(--card2);
    color:var(--muted);
    padding:8px 16px;
    border-radius:15px;
    font-size:13px;
}

.msg{
    max-width:65%;
    padding:12px 14px 7px;
    border-radius:16px;
    margin-bottom:12px;
    line-height:1.5;
    font-size:15px;
    word-wrap:break-word;
}

.other{
    background:#1f1f1f;
    color:white;
}

body.light-mode .other{
    background:white;
    color:#111;
    border:1px solid var(--border);
}

.me{
    background:var(--green);
    color:black;
    margin-left:auto;
    font-weight:600;
}

.msg-time{
    display:block;
    text-align:right;
    font-size:11px;
    opacity:0.65;
    margin-top:4px;
}

.msg img{
    max-width:240px;
    border-radius:14px;
    display:block;
    margin-bottom:6px;
}

.doc-box{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:210px;
}

.doc-icon{
    font-size:28px;
}

.input-area{
    background:var(--card);
    border-top:1px solid var(--border);
    padding:14px;
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
}

.plus-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:var(--green);
    color:black;
    font-size:30px;
    font-weight:bold;
    cursor:pointer;
}

.file-menu{
    position:absolute;
    left:14px;
    bottom:76px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    display:none;
    min-width:190px;
}

.file-menu label{
    display:block;
    padding:14px 18px;
    cursor:pointer;
    color:var(--text);
    font-weight:bold;
}

.file-menu label:hover{
    background:var(--green);
    color:black;
}

#imageFile,
#docFile{
    display:none;
}

.input-area input[type="text"]{
    flex:1;
    height:48px;
    border:none;
    outline:none;
    background:var(--card2);
    color:var(--text);
    border-radius:25px;
    padding:0 18px;
    font-size:15px;
    border:1px solid var(--border);
}

.send{
    background:var(--green);
    color:black;
    border:none;
    padding:13px 24px;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:850px){

    body{
        overflow:auto;
    }

    .navbar{
        height:65px;
        padding:0 16px;
    }

    .logo{
        font-size:28px;
    }

    .chat-page{
        display:block;
        height:auto;
    }

    .chat-list{
        width:100%;
        height:calc(100vh - 65px);
        border-right:none;
        display:block;
    }

    .chat-title{
        padding:18px;
        font-size:26px;
    }

    .search{
        margin:0 15px 14px;
    }

    .search input{
        padding:13px;
        font-size:14px;
    }

    .chat-user{
        padding:14px 15px;
        gap:12px;
    }

    .chat-user img{
        width:54px;
        height:54px;
    }

    .chat-info h3{
        font-size:16px;
    }

    .chat-info p{
        font-size:13px;
    }

    .chat-box{
        position:fixed;
        top:65px;
        left:0;
        width:100%;
        height:calc(100vh - 65px);
        z-index:9999;
        display:none;
    }

    .chat-box.active{
        display:flex;
    }

    .back-btn{
        display:block;
    }

    .chat-header{
        height:68px;
        padding:0 14px;
    }

    .profile{
        gap:10px;
    }

    .profile img{
        width:44px;
        height:44px;
    }

    .profile h3{
        font-size:17px;
    }

    .profile p{
        font-size:12px;
    }

    .header-icons{
        gap:16px;
        font-size:22px;
    }

    .messages{
        padding:16px 12px 90px;
        background-size:180px;
    }

    .msg{
        max-width:88%;
        font-size:14px;
        padding:11px 12px 6px;
    }

    .msg img{
        max-width:100%;
    }

    .input-area{
        padding:10px;
        gap:8px;
    }

    .plus-btn{
        width:42px;
        height:42px;
        font-size:26px;
    }

    .input-area input[type="text"]{
        height:42px;
        font-size:14px;
        padding:0 14px;
    }

    .send{
        padding:11px 18px;
        font-size:14px;
    }

    .search-tab{
        width:230px;
        right:10px;
    }

    .more-tab{
        right:10px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <a href="ProjectFRE.html" class="logo">GeNeX</a>
</div>

<div class="chat-page">

<div class="chat-list">

<h1 class="chat-title">Chats</h1>

<div class="search">
    <input type="text" id="searchInput" placeholder="Search chat" onkeyup="searchChat()">
</div>

<div class="chat-user active" data-name="arun" data-user="arun" onclick="openChatByKey('arun')">
    <a href="chat-profile.html?user=arun" class="profile-link" onclick="event.stopPropagation()">
        <img src="https://i.pinimg.com/736x/9b/2c/9e/9b2c9ebcade406ceb9ee20063e88332c.jpg">
    </a>

    <div class="chat-info">
        <h3>Arun</h3>
        <p></p>
    </div>

    <span class="small-time"></span>
</div>

<div class="chat-user" data-name="praveen" data-user="praveen" onclick="openChatByKey('praveen')">
    <a href="chat-profile.html?user=praveen" class="profile-link" onclick="event.stopPropagation()">
        <img src="https://i.pinimg.com/736x/8c/ec/d8/8cecd8323cb1bd0d50e67c20daacc078.jpg">
    </a>

    <div class="chat-info">
        <h3>Praveen</h3>
        <p></p>
    </div>

    <span class="small-time"></span>
</div>

</div>

<div class="chat-box" id="chatBox">

<div class="chat-header">

<div class="header-left">

<button class="back-btn" onclick="closeChat()">←</button>

<div class="profile">

<a id="headerProfileLink" href="chat-profile.html?user=arun">
<img id="profileImg" src="">
</a>

<div>
<h3 id="chatName"></h3>
<p id="chatStatus"></p>
</div>

</div>

</div>

<div class="header-icons">
    <span onclick="toggleSearchTab()">⌕</span>
    <span onclick="toggleMoreTab()">⋮</span>
</div>

<div class="search-tab" id="searchTab">
    <p id="searchText"></p>
    <input type="text" placeholder="Search message...">
</div>

<div class="more-tab" id="moreTab">
    <p onclick="blockUser()">Block</p>
    <p onclick="reportUser()">Report</p>
</div>

</div>

<div class="messages" id="messages"></div>

<div class="input-area">

<button class="plus-btn" onclick="toggleFileMenu()">+</button>

<div class="file-menu" id="fileMenu">
    <label for="imageFile">Image</label>
    <label for="docFile">Document</label>
</div>

<input type="file" id="imageFile" accept="image/*" onchange="sendImage(event)">
<input type="file" id="docFile" onchange="sendDocument(event)">

<input type="text" id="messageInput" placeholder="Type a message" onkeypress="enterSend(event)">

<button class="send" onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script>
function applyTheme(){

    var theme = localStorage.getItem("genexTheme");

    if(theme == "light"){
        document.body.classList.add("light-mode");
    }
    else{
        document.body.classList.remove("light-mode");
    }
}

applyTheme();

var chats = {

    arun:{
        name:"Arun",
        status:"online",
        img:"https://i.pinimg.com/736x/9b/2c/9e/9b2c9ebcade406ceb9ee20063e88332c.jpg",
        messages:[
            {type:"other", text:"Bro laptop review pathiya?", time:"11:45"},
            {type:"me", text:"Aama bro specs semma", time:"11:46 ✓✓"}
        ]
    },

    praveen:{
        name:"Praveen",
        status:"offline",
        img:"https://i.pinimg.com/736x/8c/ec/d8/8cecd8323cb1bd0d50e67c20daacc078.jpg",
        messages:[
            {type:"other", text:"UI semma bro", time:"10:10"},
            {type:"me", text:"Thanks bro", time:"10:11 ✓✓"}
        ]
    }

};

var currentUserKey = "arun";

function getTime(){

    var now = new Date();

    var h = now.getHours();
    var m = now.getMinutes();

    if(h < 10){
        h = "0" + h;
    }

    if(m < 10){
        m = "0" + m;
    }

    return h + ":" + m;
}

function updateChatListPreview(){

    var users = document.querySelectorAll(".chat-user");

    users.forEach(function(user){

        var key = user.getAttribute("data-user");

        var lastMsg =
        chats[key].messages[chats[key].messages.length - 1];

        user.querySelector(".chat-info p").innerText =
        lastMsg.text.replace(/<[^>]*>/g,'');

        user.querySelector(".small-time").innerText =
        lastMsg.time.replace("✓✓","");
    });
}

function openChatByKey(key){

    currentUserKey = key;

    var chat = chats[key];

    document.getElementById("chatName").innerText = chat.name;
    document.getElementById("chatStatus").innerText = chat.status;
    document.getElementById("profileImg").src = chat.img;

    document.getElementById("headerProfileLink").href =
    "chat-profile.html?user=" + key;

    document.getElementById("searchText").innerText =
    "Search messages with " + chat.name;

    loadMessages(key);

    document.getElementById("searchTab").style.display = "none";
    document.getElementById("moreTab").style.display = "none";

    var users = document.querySelectorAll(".chat-user");

    users.forEach(function(user){

        user.classList.remove("active");

        if(user.getAttribute("data-user") == key){
            user.classList.add("active");
        }
    });

    if(window.innerWidth <= 850){
        document.getElementById("chatBox").classList.add("active");
    }
}

function closeChat(){

    if(window.innerWidth <= 850){

        document
        .getElementById("chatBox")
        .classList.remove("active");
    }
}

function loadMessages(key){

    var messages =
    document.getElementById("messages");

    var chat = chats[key];

    messages.innerHTML =
    '<div class="date-line">Today</div>';

    for(var i=0;i<chat.messages.length;i++){

        messages.innerHTML +=

        '<div class="msg ' +
        chat.messages[i].type +
        '">' +

        chat.messages[i].text +

        '<span class="msg-time">' +
        chat.messages[i].time +
        '</span></div>';
    }

    messages.scrollTop =
    messages.scrollHeight;
}

function sendMessage(){

    var input =
    document.getElementById("messageInput");

    if(input.value.trim() == ""){
        return;
    }

    chats[currentUserKey].messages.push({
        type:"me",
        text:input.value,
        time:getTime() + " ✓✓"
    });

    input.value = "";

    loadMessages(currentUserKey);

    updateChatListPreview();
}

function enterSend(event){

    if(event.key == "Enter"){
        sendMessage();
    }
}

function toggleSearchTab(){

    var searchTab =
    document.getElementById("searchTab");

    var moreTab =
    document.getElementById("moreTab");

    moreTab.style.display = "none";

    if(searchTab.style.display == "block"){
        searchTab.style.display = "none";
    }
    else{
        searchTab.style.display = "block";
    }
}

function toggleMoreTab(){

    var moreTab =
    document.getElementById("moreTab");

    var searchTab =
    document.getElementById("searchTab");

    searchTab.style.display = "none";

    if(moreTab.style.display == "block"){
        moreTab.style.display = "none";
    }
    else{
        moreTab.style.display = "block";
    }
}

function blockUser(){

    alert(chats[currentUserKey].name + " blocked");

    document.getElementById("moreTab").style.display = "none";
}

function reportUser(){

    alert(chats[currentUserKey].name + " reported");

    document.getElementById("moreTab").style.display = "none";
}

function toggleFileMenu(){

    var menu =
    document.getElementById("fileMenu");

    if(menu.style.display == "block"){
        menu.style.display = "none";
    }
    else{
        menu.style.display = "block";
    }
}

function sendImage(event){

    var file = event.target.files[0];

    if(file){

        var reader = new FileReader();

        reader.onload = function(e){

            chats[currentUserKey].messages.push({
                type:"me",
                text:'<img src="' + e.target.result + '">',
                time:getTime() + " ✓✓"
            });

            loadMessages(currentUserKey);

            updateChatListPreview();
        };

        reader.readAsDataURL(file);
    }

    document.getElementById("fileMenu").style.display = "none";

    event.target.value = "";
}

function sendDocument(event){

    var file = event.target.files[0];

    if(file){

        chats[currentUserKey].messages.push({
            type:"me",
            text:'<div class="doc-box"><span class="doc-icon">📄</span><div><b>' + file.name + '</b></div></div>',
            time:getTime() + " ✓✓"
        });

        loadMessages(currentUserKey);

        updateChatListPreview();
    }

    document.getElementById("fileMenu").style.display = "none";

    event.target.value = "";
}

function searchChat(){

    var search =
    document.getElementById("searchInput")
    .value.toLowerCase();

    var users =
    document.querySelectorAll(".chat-user");

    users.forEach(function(user){

        var name =
        user.getAttribute("data-name");

        if(name.includes(search)){
            user.style.display = "flex";
        }
        else{
            user.style.display = "none";
        }
    });
}

updateChatListPreview();

openChatByKey("arun");
</script>

</body>
</html>
