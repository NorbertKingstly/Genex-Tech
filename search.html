<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeNeX Search</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#000;
    --text:white;
    --nav:#0b0b0b;
    --card:#101010;
    --card2:#151515;
    --border:#222;
    --green:#39ff14;
    --muted:#aaa;
}

body.light,
body.light-mode{
    --bg:#f4f4f4;
    --text:#111;
    --nav:#ffffff;
    --card:#ffffff;
    --card2:#f7f7f7;
    --border:#ddd;
    --green:#39ff14;
    --muted:#555;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    width:100%;
    min-height:78px;
    background:var(--nav);
    border-bottom:1px solid var(--green);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 55px;
    position:sticky;
    top:0;
    z-index:999;
    gap:15px;
}

.logo{
    color:var(--green);
    font-size:34px;
    font-weight:900;
    text-decoration:none;
    flex-shrink:0;
}

.home-btn{
    background:var(--green);
    color:black;
    padding:10px 22px;
    border-radius:30px;
    text-decoration:none;
    font-weight:800;
    white-space:nowrap;
    transition:0.25s;
}

.home-btn:hover{
    transform:scale(1.04);
}

/* CONTAINER */

.container{
    width:100%;
    max-width:860px;
    margin:auto;
    padding:45px 20px 60px;
}

.title{
    color:var(--green);
    font-size:58px;
    font-weight:900;
    margin-bottom:28px;
    line-height:1.1;
    word-break:break-word;
}

/* SEARCH */

.search-box{
    position:relative;
    margin-bottom:25px;
}

.search-input{
    width:100%;
    padding:18px 60px 18px 22px;
    border-radius:22px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    outline:none;
    font-size:18px;
    transition:0.25s;
}

.search-input:focus{
    border-color:var(--green);
    box-shadow:0 0 18px rgba(57,255,20,0.15);
}

.clear-btn{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:26px;
    cursor:pointer;
    color:var(--muted);
    display:none;
}

.clear-btn:hover{
    color:var(--green);
}

/* HEADINGS */

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.section-title{
    color:var(--green);
    font-size:24px;
    font-weight:900;
    margin:22px 0 14px;
}

.clear-recent{
    background:none;
    border:none;
    color:var(--green);
    font-weight:800;
    cursor:pointer;
    font-size:14px;
}

/* USER CARD */

.user-card{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:16px;
    cursor:pointer;
    transition:0.25s;
    overflow:hidden;
}

.user-card:hover{
    border-color:var(--green);
    background:var(--card2);
    transform:translateY(-2px);
}

.user-img{
    width:70px;
    height:70px;
    min-width:70px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--green);
}

.user-info{
    flex:1;
    min-width:0;
}

.user-info h2{
    color:var(--text);
    font-size:27px;
    margin-bottom:4px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.user-info p{
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
    word-break:break-word;
}

.remove-btn{
    font-size:28px;
    color:var(--muted);
    cursor:pointer;
    padding:4px 10px;
    flex-shrink:0;
}

.remove-btn:hover{
    color:var(--green);
}

.empty{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:35px;
    text-align:center;
    color:var(--muted);
    font-size:17px;
}

#recentBox{
    display:none;
}

/* TABLET */

@media(max-width:900px){

    .navbar{
        padding:0 24px;
    }

    .title{
        font-size:48px;
    }

}

/* MOBILE */

@media(max-width:650px){

    .navbar{
        padding:14px 16px;
        min-height:auto;
        flex-wrap:wrap;
    }

    .logo{
        font-size:28px;
    }

    .home-btn{
        padding:9px 14px;
        font-size:13px;
    }

    .container{
        padding:28px 16px 45px;
    }

    .title{
        font-size:38px;
        margin-bottom:22px;
    }

    .search-input{
        padding:15px 52px 15px 18px;
        font-size:15px;
        border-radius:18px;
    }

    .clear-btn{
        right:16px;
        font-size:22px;
    }

    .section-title{
        font-size:21px;
    }

    .user-card{
        padding:14px;
        border-radius:20px;
        gap:12px;
        align-items:flex-start;
    }

    .user-img{
        width:58px;
        height:58px;
        min-width:58px;
    }

    .user-info h2{
        font-size:20px;
        white-space:normal;
    }

    .user-info p{
        font-size:13px;
    }

    .remove-btn{
        font-size:22px;
        padding:0;
    }

    .empty{
        padding:28px 18px;
        font-size:15px;
    }

}

/* EXTRA SMALL */

@media(max-width:420px){

    .navbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .home-btn{
        width:100%;
        text-align:center;
    }

    .title{
        font-size:32px;
    }

    .user-card{
        flex-direction:row;
    }

}

</style>
</head>

<body>

<div class="navbar">

    <a href="ProjectFRE.html" class="logo">GeNeX</a>

    <a href="ProjectFRE.html" class="home-btn">
        ← Home
    </a>

</div>

<div class="container">

    <h1 class="title">Search</h1>

    <div class="search-box">

        <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search user id..."
        oninput="searchUsers()">

        <span id="clearBtn"
        class="clear-btn"
        onclick="clearSearch()">×</span>

    </div>

    <div id="resultArea"></div>

    <div id="recentBox">

        <div class="section-head">

            <h2 class="section-title">Recent</h2>

            <button class="clear-recent"
            onclick="clearRecent()">
            Clear all
            </button>

        </div>

        <div id="recentArea"></div>

    </div>

</div>

<script>

function applyTheme(){

    var theme =
    localStorage.getItem("genexTheme");

    if(theme == "light"){

        document.body.classList.add("light");
        document.body.classList.add("light-mode");

    }
    else{

        document.body.classList.remove("light");
        document.body.classList.remove("light-mode");

    }
}

applyTheme();

var users = [

{
    key:"arun",
    name:"Arun",
    bio:"Tech lover | Laptop reviews",
    image:"https://i.pinimg.com/736x/9b/2c/9e/9b2c9ebcade406ceb9ee20063e88332c.jpg"
},

{
    key:"praveen",
    name:"Praveen",
    bio:"Gadget finder | Honest reviews",
    image:"https://i.pinimg.com/736x/8c/ec/d8/8cecd8323cb1bd0d50e67c20daacc078.jpg"
},

{
    key:"khaleel",
    name:"Khaleel",
    bio:"Amazon finds | Trusted links",
    image:"https://i.pinimg.com/736x/1d/90/f4/1d90f4cf24c5bc6362e88b3199d690d5.jpg"
},

{
    key:"kalai",
    name:"Kalai",
    bio:"Frontend learner | UI ideas",
    image:"https://i.pinimg.com/736x/d8/ce/17/d8ce170ff9a9ab7e8c7e496aec03db33.jpg"
},

{
    key:"norbert",
    name:"Norbert",
    bio:"GeNeX creator | Frontend developer",
    image:"https://i.pinimg.com/736x/bf/a4/23/bfa42356138c4e4cb30e407ccf9b6bec.jpg"
}

];

function makeCard(user,recentMode){

    var removeBtn = "";

    if(recentMode == true){

        removeBtn =
        '<span class="remove-btn" onclick="removeRecent(event,\'' + user.key + '\')">×</span>';

    }

    return '

    <div class="user-card"
    onclick="openUser(\'' + user.key + '\')">

        <img class="user-img"
        src="' + user.image + '">

        <div class="user-info">

            <h2>' + user.name + '</h2>

            <p>@' + user.key + ' · ' + user.bio + '</p>

        </div>

        ' + removeBtn + '

    </div>';
}

function searchUsers(){

    var value =
    document.getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

    var area =
    document.getElementById("resultArea");

    var clearBtn =
    document.getElementById("clearBtn");

    area.innerHTML = "";

    if(value == ""){

        clearBtn.style.display = "none";

        loadRecent();

        return;
    }

    clearBtn.style.display = "block";

    document.getElementById("recentBox")
    .style.display = "none";

    var found = false;

    for(var i=0;i<users.length;i++){

        if(
            users[i].key.toLowerCase().includes(value)
            ||
            users[i].name.toLowerCase().includes(value)
        ){

            found = true;

            area.innerHTML += makeCard(users[i],false);
        }
    }

    if(found == false){

        area.innerHTML =
        '<div class="empty">No user found bro.</div>';
    }
}

function openUser(key){

    var recent =
    JSON.parse(
    localStorage.getItem("genexRecentSearch")
    ) || [];

    recent = recent.filter(function(item){

        return item != key;

    });

    recent.unshift(key);

    if(recent.length > 8){

        recent.pop();
    }

    localStorage.setItem(
        "genexRecentSearch",
        JSON.stringify(recent)
    );

    document.getElementById("searchInput").value = "";

    document.getElementById("resultArea").innerHTML = "";

    window.location.href =
    "followers-profile.html?user=" + key;
}

function loadRecent(){

    var recentBox =
    document.getElementById("recentBox");

    var recentArea =
    document.getElementById("recentArea");

    var recent =
    JSON.parse(
    localStorage.getItem("genexRecentSearch")
    ) || [];

    recentArea.innerHTML = "";

    if(recent.length == 0){

        recentBox.style.display = "none";

        return;
    }

    recentBox.style.display = "block";

    for(var i=0;i<recent.length;i++){

        for(var j=0;j<users.length;j++){

            if(users[j].key == recent[i]){

                recentArea.innerHTML +=
                makeCard(users[j],true);
            }
        }
    }
}

function removeRecent(event,key){

    event.stopPropagation();

    var recent =
    JSON.parse(
    localStorage.getItem("genexRecentSearch")
    ) || [];

    recent = recent.filter(function(item){

        return item != key;

    });

    localStorage.setItem(
        "genexRecentSearch",
        JSON.stringify(recent)
    );

    loadRecent();
}

function clearRecent(){

    localStorage.removeItem("genexRecentSearch");

    loadRecent();
}

function clearSearch(){

    document.getElementById("searchInput").value = "";

    document.getElementById("clearBtn").style.display = "none";

    document.getElementById("resultArea").innerHTML = "";

    loadRecent();
}

document.getElementById("searchInput").value = "";

document.getElementById("resultArea").innerHTML = "";

loadRecent();

</script>

</body>
</html>
