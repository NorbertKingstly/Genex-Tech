<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeNeX Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#000;
    --text:white;
    --nav:#0b0b0b;
    --card:#101010;
    --card2:#151515;
    --border:#222;
    --green:#39ff14;
    --muted:#aaa;
}

body.light-mode{
    --bg:#f4f4f4;
    --text:#111;
    --nav:#ffffff;
    --card:#ffffff;
    --card2:#f7f7f7;
    --border:#ddd;
    --green:#39ff14;
    --muted:#555;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.navbar{
    width:100%;
    min-height:78px;
    background:var(--nav);
    border-bottom:1px solid var(--green);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 55px;
    position:sticky;
    top:0;
    z-index:999;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    color:var(--green);
    font-size:34px;
    font-weight:900;
    text-decoration:none;
}

.back-btn{
    background:var(--green);
    color:black;
    padding:10px 24px;
    border-radius:30px;
    text-decoration:none;
    font-weight:800;
    white-space:nowrap;
}

.container{
    width:100%;
    max-width:950px;
    margin:35px auto;
    padding:0 20px 40px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:26px;
    margin-bottom:24px;
    width:100%;
}

.card h2{
    color:var(--green);
    font-size:28px;
    margin-bottom:22px;
    word-break:break-word;
}

.account-top{
    display:flex;
    align-items:center;
    gap:22px;
    margin-bottom:24px;
    flex-wrap:wrap;
}

.account-img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--green);
    background:#fff;
    flex-shrink:0;
}

.account-name{
    flex:1;
    min-width:200px;
}

.account-name h3{
    color:var(--green);
    font-size:28px;
    margin-bottom:6px;
    word-break:break-word;
}

.account-name p{
    color:var(--muted);
    font-size:15px;
    word-break:break-word;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.input-group{
    margin-bottom:14px;
    width:100%;
}

.input-group label{
    display:block;
    color:var(--muted);
    font-size:14px;
    margin-bottom:7px;
}

input,
textarea{
    width:100%;
    padding:14px;
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:14px;
    outline:none;
    font-size:15px;
}

textarea{
    height:120px;
    resize:none;
}

.full{
    grid-column:1/-1;
}

.btn-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:10px;
}

.btn{
    background:var(--green);
    color:black;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    font-weight:800;
    cursor:pointer;
    text-decoration:none;
    text-align:center;
}

.dark-btn{
    background:var(--card2);
    color:var(--text);
    border:1px solid var(--border);
}

.setting-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    padding:18px 0;
    border-bottom:1px solid var(--border);
    flex-wrap:wrap;
}

.setting-row:last-child{
    border-bottom:none;
}

.setting-row h3{
    font-size:18px;
    margin-bottom:6px;
}

.setting-row p{
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
}

.switch{
    position:relative;
    width:62px;
    height:34px;
    flex-shrink:0;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#333;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:26px;
    height:26px;
    left:4px;
    top:4px;
    background:white;
    border-radius:50%;
    transition:0.3s;
}

.switch input:checked + .slider{
    background:var(--green);
}

.switch input:checked + .slider:before{
    transform:translateX(28px);
}

.link-box{
    display:block;
    text-decoration:none;
    color:var(--text);
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    margin-bottom:14px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    word-break:break-word;
}

.link-box:hover{
    border-color:var(--green);
    color:var(--green);
}

.report-form{
    display:none;
    margin-top:15px;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
}

.report-form.active{
    display:block;
}

.logout-btn{
    background:#2b1111;
    color:#ff5c5c;
    border:1px solid #5c2222;
}

/* TABLET */
@media(max-width:900px){

    .navbar{
        padding:16px 25px;
    }

    .container{
        padding:0 16px 30px;
    }

    .card{
        padding:22px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }
}

/* MOBILE */
@media(max-width:650px){

    .navbar{
        padding:14px 16px;
        min-height:auto;
    }

    .logo{
        font-size:28px;
    }

    .back-btn{
        padding:9px 16px;
        font-size:13px;
    }

    .container{
        margin:22px auto;
        padding:0 12px 25px;
    }

    .card{
        padding:18px;
        border-radius:20px;
    }

    .card h2{
        font-size:24px;
    }

    .account-top{
        flex-direction:column;
        text-align:center;
        gap:16px;
    }

    .account-img{
        width:95px;
        height:95px;
    }

    .account-name h3{
        font-size:24px;
    }

    .account-name p{
        font-size:14px;
    }

    input,
    textarea{
        font-size:14px;
        padding:13px;
    }

    .btn-row{
        flex-direction:column;
    }

    .btn{
        width:100%;
        padding:13px;
        font-size:14px;
    }

    .setting-row{
        align-items:flex-start;
        flex-direction:column;
    }

    .link-box{
        padding:16px;
        font-size:15px;
    }

    .report-form{
        padding:14px;
    }
}

/* SMALL MOBILE */
@media(max-width:420px){

    .logo{
        font-size:24px;
    }

    .back-btn{
        font-size:12px;
        padding:8px 14px;
    }

    .card h2{
        font-size:22px;
    }

    .account-name h3{
        font-size:22px;
    }

    .setting-row h3{
        font-size:16px;
    }

    .setting-row p{
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <a href="ProjectFRE.html" class="logo">GeNeX</a>
    <a href="ProjectFRE.html" class="back-btn">Back</a>
</div>

<div class="container">

    <div class="card">
        <h2>Account Details</h2>

        <div class="account-top">
            <img id="previewImage" class="account-img" src="IMG_8295.JPG.jpeg">

            <div class="account-name">
                <h3 id="previewName">Liyo Clevert</h3>
                <p id="previewUsername">@liyo_clevert</p>
            </div>
        </div>

        <div class="form-grid">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="profileName">
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="profileUsername">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="profileEmail">
            </div>

            <div class="input-group full">
                <label>Bio</label>
                <textarea id="profileBio"></textarea>
            </div>

        </div>

        <div class="btn-row">
            <button class="btn">Save Changes</button>
            <a href="profile.html" class="btn dark-btn">View Profile</a>
        </div>
    </div>

</div>

</body>
</html>
