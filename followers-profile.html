<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Followers Profile • GeNeX</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#050505;
    --text:#ffffff;
    --nav:#0b0b0b;
    --card:#111111;
    --card2:#171717;
    --border:#252525;
    --green:#39ff14;
    --muted:#9a9a9a;
    --shadow:0 0 35px rgba(57,255,20,0.18);
}

body.light-mode{
    --bg:#f4f4f4;
    --text:#111111;
    --nav:#ffffff;
    --card:#ffffff;
    --card2:#f7f7f7;
    --border:#dddddd;
    --green:#39ff14;
    --muted:#666666;
    --shadow:0 0 30px rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    width:100%;
    height:82px;
    padding:0 60px;
    background:rgba(0,0,0,0.72);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(57,255,20,0.25);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:999;
}

body.light-mode .navbar{
    background:rgba(255,255,255,0.85);
}

.logo{
    text-decoration:none;
    color:var(--green);
    font-size:38px;
    font-weight:900;
    letter-spacing:1px;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:14px;
}

.nav-btn{
    background:var(--green);
    color:#000;
    padding:11px 24px;
    border-radius:40px;
    text-decoration:none;
    font-weight:800;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.nav-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(57,255,20,0.5);
}

/* COVER */

.cover{
    width:100%;
    height:310px;
    position:relative;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(45%);
}

.cover::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,transparent,rgba(0,0,0,0.85));
}

/* PROFILE */

.profile{
    max-width:1180px;
    margin:auto;
    padding:0 22px 50px;
    position:relative;
    margin-top:-95px;
    z-index:10;
}

.profile-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:35px;
    padding:35px;
    backdrop-filter:blur(15px);
    box-shadow:var(--shadow);
}

.profile-top{
    display:flex;
    gap:35px;
    align-items:flex-start;
}

.main-dp{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid var(--green);
    box-shadow:0 0 25px rgba(57,255,20,0.35);
}

.profile-info{
    flex:1;
}

.profile-info h1{
    font-size:44px;
    color:var(--green);
    margin-bottom:6px;
}

.username{
    color:var(--muted);
    font-size:18px;
    margin-bottom:16px;
}

.bio{
    max-width:720px;
    line-height:1.8;
    font-size:16px;
    color:var(--text);
}

.stats{
    display:flex;
    gap:50px;
    margin-top:25px;
    flex-wrap:wrap;
}

.stat-box h2{
    color:var(--green);
    font-size:30px;
    margin-bottom:2px;
}

.stat-box p{
    color:var(--muted);
    font-size:14px;
}

.btn-row{
    display:flex;
    gap:14px;
    margin-top:28px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    cursor:pointer;
    text-decoration:none;
    padding:13px 28px;
    border-radius:40px;
    font-weight:800;
    transition:0.3s;
    font-size:15px;
}

.primary-btn{
    background:var(--green);
    color:#000;
}

.secondary-btn{
    background:var(--card2);
    border:1px solid var(--border);
    color:var(--text);
}

.btn:hover{
    transform:translateY(-2px);
}

/* TABS */

.tabs{
    margin-top:32px;
    display:flex;
    justify-content:center;
    gap:60px;
    border-top:1px solid var(--border);
    padding-top:24px;
    flex-wrap:wrap;
}

.tabs span{
    font-size:16px;
    color:var(--muted);
    cursor:pointer;
    font-weight:800;
    transition:0.3s;
    position:relative;
}

.tabs span.active{
    color:var(--green);
}

.tabs span.active::after{
    content:"";
    position:absolute;
    width:100%;
    height:2px;
    background:var(--green);
    left:0;
    bottom:-10px;
}

/* POSTS */

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    margin-top:35px;
}

.grid-post{
    position:relative;
    height:330px;
    overflow:hidden;
    border-radius:24px;
    background:var(--card2);
    cursor:pointer;
    border:1px solid var(--border);
}

.grid-post img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.grid-post:hover img{
    transform:scale(1.08);
    filter:brightness(55%);
}

.post-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
    opacity:0;
    transition:0.4s;
    display:flex;
    align-items:flex-end;
    padding:22px;
}

.grid-post:hover .post-overlay{
    opacity:1;
}

.post-overlay h3{
    color:#fff;
    font-size:20px;
}

/* BLOGS */

.blog-list{
    max-width:820px;
    margin:35px auto 0;
    display:flex;
    flex-direction:column;
    gap:22px;
}

.blog-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:26px;
    padding:24px;
    box-shadow:var(--shadow);
}

.blog-top{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.blog-top img{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--green);
}

.blog-top h3{
    color:var(--green);
    margin-bottom:4px;
}

.blog-top p{
    color:var(--muted);
    font-size:13px;
}

.blog-text{
    line-height:1.9;
    color:var(--text);
}

.blog-actions{
    margin-top:18px;
    display:flex;
    gap:30px;
    color:var(--muted);
    font-size:15px;
}

/* POPUP */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
    backdrop-filter:blur(12px);
}

.popup-box{
    width:1000px;
    max-width:95vw;
    height:82vh;
    background:var(--card);
    border:1px solid rgba(57,255,20,0.35);
    border-radius:30px;
    overflow:hidden;
    display:grid;
    grid-template-columns:56% 44%;
    animation:popupShow 0.35s ease;
}

@keyframes popupShow{
    from{
        opacity:0;
        transform:scale(0.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.popup-img-box{
    background:#000;
}

.popup-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.popup-content{
    padding:28px;
    overflow-y:auto;
}

.popup-user{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:24px;
}

.popup-dp{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--green);
}

.popup-name{
    color:var(--green);
    font-size:18px;
    font-weight:800;
}

.popup-title{
    font-size:30px;
    margin-bottom:14px;
}

.popup-desc{
    line-height:1.9;
    color:var(--text);
}

.actions{
    display:flex;
    gap:30px;
    margin-top:30px;
    font-size:30px;
}

.action{
    cursor:pointer;
    transition:0.3s;
}

.action:hover{
    transform:scale(1.15);
    color:var(--green);
}

.likes{
    margin-top:18px;
    color:var(--muted);
}

.comment-input{
    width:100%;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--text);
    outline:none;
}

.comment-btn{
    width:100%;
    margin-top:14px;
    padding:15px;
    border:none;
    border-radius:40px;
    background:var(--green);
    color:#000;
    font-weight:900;
    cursor:pointer;
}

.comment-list{
    margin-top:18px;
    line-height:1.8;
    color:var(--muted);
}

/* MOBILE */

@media(max-width:900px){

    .navbar{
        padding:0 18px;
    }

    .logo{
        font-size:30px;
    }

    .cover{
        height:230px;
    }

    .profile{
        margin-top:-70px;
    }

    .profile-card{
        padding:24px;
    }

    .profile-top{
        flex-direction:column;
        align-items:center;
        text-align:center;
    }

    .stats{
        justify-content:center;
        gap:30px;
    }

    .btn-row{
        justify-content:center;
    }

    .tabs{
        gap:28px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .popup-box{
        grid-template-columns:1fr;
        height:94vh;
    }

    .popup-img-box{
        height:42vh;
    }
}

</style>
</head>

<body>

<div class="navbar">

    <a href="ProjectFRE.html" class="logo">GeNeX</a>

    <div class="nav-right">

        <button class="nav-btn" onclick="history.back()">← Back</button>

        <a href="ProjectFRE.html" class="nav-btn">Home</a>

    </div>

</div>

<div class="cover">

    <img id="coverImage" src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop">

</div>

<div class="profile">

    <div class="profile-card">

        <div class="profile-top">

            <img id="profileImage" class="main-dp">

            <div class="profile-info">

                <h1 id="profileName"></h1>

                <p id="username" class="username"></p>

                <p id="profileBio" class="bio"></p>

                <div class="stats">

                    <div class="stat-box">
                        <h2 id="postCount"></h2>
                        <p>Posts</p>
                    </div>

                    <div class="stat-box">
                        <h2 id="followersCount"></h2>
                        <p>Followers</p>
                    </div>

                    <div class="stat-box">
                        <h2 id="followingCount"></h2>
                        <p>Following</p>
                    </div>

                </div>

                <div class="btn-row">

                    <button class="btn secondary-btn" id="followBtn" onclick="toggleFollow()">
                        Following
                    </button>

                    <a id="messageBtn" href="chat.html" class="btn primary-btn">
                        Message
                    </a>

                </div>

            </div>

        </div>

        <div class="tabs">

            <span id="postTab" class="active" onclick="showTab('posts')">
                ▦ Posts
            </span>

            <span id="blogTab" onclick="showTab('blogs')">
                ✎ Blogs
            </span>

            <span id="tagTab" onclick="showTab('tagged')">
                ⌘ Tagged
            </span>

        </div>

        <div id="contentArea"></div>

    </div>

</div>

<div class="popup" id="popup" onclick="closeOutside(event)">

    <div class="popup-box" onclick="event.stopPropagation()">

        <div class="popup-img-box">

            <img id="popupImage" class="popup-img">

        </div>

        <div class="popup-content">

            <div class="popup-user">

                <img id="popupDp" class="popup-dp">

                <div id="popupUser" class="popup-name"></div>

            </div>

            <h2 id="popupTitle" class="popup-title"></h2>

            <p id="popupDesc" class="popup-desc"></p>

            <div class="actions">

                <span class="action" onclick="likePost(this)">♡</span>

                <span class="action" onclick="focusComment()">💬</span>

                <span class="action" onclick="sharePost()">↗</span>

            </div>

            <div class="likes" id="likeText">0 likes</div>

            <input id="commentInput"
                   class="comment-input"
                   type="text"
                   placeholder="Add a comment...">

            <button class="comment-btn" onclick="addComment()">
                Post Comment
            </button>

            <div id="commentList" class="comment-list"></div>

        </div>

    </div>

</div>

<script>

function applyTheme(){

    var theme = localStorage.getItem("genexTheme");

    if(theme == "light"){
        document.body.classList.add("light-mode");
    }
    else{
        document.body.classList.remove("light-mode");
    }
}

applyTheme();

var users = {

    norbert:{
        name:"Norbert",
        username:"@norbert_genex",
        image:"https://i.pinimg.com/736x/bf/a4/23/bfa42356138c4e4cb30e407ccf9b6bec.jpg",
        cover:"https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop",
        bio:"GeNeX creator • Frontend developer • Building trusted tech communities",
        followers:"210K",
        following:"70",
        posts:[
            {
                title:"Building GeNeX",
                image:"https://i.pinimg.com/736x/37/92/2f/37922ff168ed3934c80f35aed1335033.jpg",
                content:"Creating a trusted tech community with honest reviews and modern UI experience."
            },
            {
                title:"Frontend Progress",
                image:"https://i.pinimg.com/736x/31/3d/53/313d53c883bb0bb579775db3d4595e3a.jpg",
                content:"Every small frontend improvement makes the project more premium."
            },
            {
                title:"Night Setup",
                image:"https://i.pinimg.com/736x/9d/68/2f/9d682fd2fcaf05f4caee5c51d2f1a8f5.jpg",
                content:"Late night coding sessions with green neon vibes."
            }
        ],
        blogs:[
            "GeNeX oda goal trusted tech community build panna.",
            "UI clean ah irundha user experience next level pogum."
        ]
    }

};

var params = new URLSearchParams(window.location.search);

var userKey = params.get("user") || "norbert";

var user = users[userKey];

var currentPosts = user.posts;

var following = true;

document.getElementById("profileImage").src = user.image;

document.getElementById("popupDp").src = user.image;

document.getElementById("coverImage").src = user.cover;

document.getElementById("profileName").innerText = user.name;

document.getElementById("popupUser").innerText = user.name;

document.getElementById("username").innerText = user.username;

document.getElementById("profileBio").innerText = user.bio;

document.getElementById("followersCount").innerText = user.followers;

document.getElementById("followingCount").innerText = user.following;

document.getElementById("postCount").innerText = user.posts.length;

document.getElementById("messageBtn").href =
"chat.html?user=" + userKey;

function toggleFollow(){

    var btn = document.getElementById("followBtn");

    if(following){

        following = false;

        btn.innerText = "Follow";

        btn.classList.remove("secondary-btn");

        btn.classList.add("primary-btn");
    }
    else{

        following = true;

        btn.innerText = "Following";

        btn.classList.remove("primary-btn");

        btn.classList.add("secondary-btn");
    }
}

function setActive(tab){

    document.getElementById("postTab").classList.remove("active");

    document.getElementById("blogTab").classList.remove("active");

    document.getElementById("tagTab").classList.remove("active");

    document.getElementById(tab).classList.add("active");
}

function loadPostGrid(posts){

    var area = document.getElementById("contentArea");

    area.innerHTML = '<div class="grid" id="grid"></div>';

    var grid = document.getElementById("grid");

    for(let i=0;i<posts.length;i++){

        var card = document.createElement("div");

        card.className = "grid-post";

        card.innerHTML =
        '<img src="'+posts[i].image+'">' +

        '<div class="post-overlay">' +

            '<h3>' + posts[i].title + '</h3>' +

        '</div>';

        card.onclick = function(){
            openPopup(i);
        };

        grid.appendChild(card);
    }
}

function loadBlogs(){

    var area = document.getElementById("contentArea");

    area.innerHTML = '<div class="blog-list" id="blogList"></div>';

    var blogList = document.getElementById("blogList");

    for(var i=0;i<user.blogs.length;i++){

        blogList.innerHTML +=

        '<div class="blog-card">' +

            '<div class="blog-top">' +

                '<img src="' + user.image + '">' +

                '<div>' +

                    '<h3>' + user.name + '</h3>' +

                    '<p>Blog post • Just now</p>' +

                '</div>' +

            '</div>' +

            '<p class="blog-text">' + user.blogs[i] + '</p>' +

            '<div class="blog-actions">' +

                '<span>♡ Like</span>' +

                '<span>💬 Comment</span>' +

                '<span>↗ Share</span>' +

            '</div>' +

        '</div>';
    }
}

function showTab(tab){

    if(tab == "posts"){

        setActive("postTab");

        currentPosts = user.posts;

        loadPostGrid(currentPosts);
    }

    else if(tab == "blogs"){

        setActive("blogTab");

        loadBlogs();
    }

    else{

        setActive("tagTab");

        currentPosts = [

            {
                title:"Tagged Post",
                image:user.posts[0].image,
                content:user.name + " got tagged in a GeNeX featured community post."
            }

        ];

        loadPostGrid(currentPosts);
    }
}

function openPopup(index){

    document.getElementById("popup").style.display = "flex";

    document.getElementById("popupImage").src =
    currentPosts[index].image;

    document.getElementById("popupTitle").innerText =
    currentPosts[index].title;

    document.getElementById("popupDesc").innerText =
    currentPosts[index].content;

    document.getElementById("likeText").innerText =
    "0 likes";

    document.getElementById("commentInput").value = "";

    document.getElementById("commentList").innerHTML = "";
}

function closeOutside(event){

    if(event.target.id == "popup"){

        document.getElementById("popup").style.display = "none";
    }
}

function likePost(btn){

    var likeText = document.getElementById("likeText");

    var count = Number(
        likeText.innerText.split(" ")[0]
    );

    if(btn.innerText == "♡"){

        btn.innerText = "♥";

        btn.style.color = "#39ff14";

        count++;
    }

    else{

        btn.innerText = "♡";

        btn.style.color = "white";

        count--;
    }

    likeText.innerText = count + " likes";
}

function focusComment(){

    document.getElementById("commentInput").focus();
}

function addComment(){

    var input = document.getElementById("commentInput");

    if(input.value.trim() == ""){

        alert("Type comment first");

        return;
    }

    document.getElementById("commentList").innerHTML +=

    "<p><b>You:</b> " + input.value + "</p>";

    input.value = "";
}

function sharePost(){

    alert("Post shared successfully");
}

loadPostGrid(user.posts);

</script>

</body>
</html>
