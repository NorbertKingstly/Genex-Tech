<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#000;
    --text:white;
    --nav:#0b0b0b;
    --card:#101010;
    --card2:#151515;
    --border:#222;
    --green:#39ff14;
    --muted:#aaa;
}

body.light-mode{
    --bg:#f4f4f4;
    --text:#111;
    --nav:#ffffff;
    --card:#ffffff;
    --card2:#f7f7f7;
    --border:#ddd;
    --green:#39ff14;
    --muted:#555;
}

body{
    height:100vh;
    background:radial-gradient(circle,#123d12,#0d0d0d 60%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--text);
}

body.light-mode{
    background:#f4f4f4;
}

.container{
    width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:25px;
    padding:35px;
    box-shadow:0 0 30px rgba(57,255,20,0.25);
}

body.light-mode .container{
    box-shadow:0 0 35px rgba(0,0,0,0.12);
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:900;
    color:var(--green);
    margin-bottom:18px;
}

h2{
    text-align:center;
    margin-bottom:10px;
    color:var(--text);
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:25px;
}

input{
    width:100%;
    height:52px;
    padding:0 15px;
    margin-bottom:16px;
    border-radius:12px;
    border:1px solid var(--border);
    outline:none;
    background:var(--bg);
    color:var(--text);
    font-size:15px;
}

input:focus{
    border:1px solid var(--green);
    box-shadow:0 0 10px rgba(57,255,20,0.3);
}

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:30px;
    background:var(--green);
    color:black;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    margin-bottom:16px;
}

button:hover{
    box-shadow:0 0 20px var(--green);
}

.hidden{
    display:none;
}

.message{
    text-align:center;
    margin-bottom:15px;
    font-size:14px;
}

.success{
    color:var(--green);
}

.error{
    color:#ff4d4d;
}

.back{
    display:block;
    text-align:center;
    margin-top:10px;
    color:var(--green);
    text-decoration:none;
    font-weight:800;
}

.check-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    font-size:14px;
    color:var(--muted);
}

.check-box input{
    width:auto;
    height:auto;
    margin:0;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">GeNeX</div>

    <h2>Forgot Password</h2>

    <p class="subtitle">
        Reset your GeNeX account password
    </p>

    <!-- Gmail -->

    <input type="email"
           id="gmail"
           placeholder="Enter your Gmail">

    <button onclick="sendOTP()">
        Send OTP
    </button>

    <!-- OTP SECTION -->

    <div id="otpSection" class="hidden">

        <input type="text"
               id="otp"
               placeholder="Enter OTP">

        <button onclick="verifyOTP()">
            Verify OTP
        </button>

    </div>

    <!-- RESET PASSWORD SECTION -->

    <div id="resetSection" class="hidden">

        <input type="password"
               id="newpass"
               placeholder="New Password">

        <input type="password"
               id="confirmpass"
               placeholder="Confirm Password">

        <div class="check-box">

            <input type="checkbox"
                   onclick="showPassword()">

            <span>Show Password</span>

        </div>

        <button onclick="resetPassword()">
            Reset Password
        </button>

    </div>

    <div id="message" class="message"></div>

    <a href="login.html" class="back">
        ⬅ Back to Login
    </a>

</div>

<script>
function applyTheme(){
    var theme = localStorage.getItem("genexTheme");

    if(theme == "light"){
        document.body.classList.add("light-mode");
    }
    else{
        document.body.classList.remove("light-mode");
    }
}

applyTheme();

var generatedOTP = "";

function sendOTP(){

    var gmail =
    document.getElementById("gmail").value;

    var savedGmail =
    localStorage.getItem("techhiveEmail");

    var message =
    document.getElementById("message");

    if(gmail == ""){

        message.innerHTML =
        "Enter your Gmail";

        message.className =
        "message error";

        return;
    }

    if(gmail != savedGmail){

        message.innerHTML =
        "This Gmail is not registered";

        message.className =
        "message error";

        return;
    }

    generatedOTP =
    Math.floor(100000 + Math.random() * 900000);

    alert(
    "OTP sent to Gmail : " + generatedOTP
    );

    document.getElementById("otpSection")
    .classList.remove("hidden");

    message.innerHTML =
    "OTP sent successfully";

    message.className =
    "message success";
}

function verifyOTP(){

    var otp =
    document.getElementById("otp").value;

    var message =
    document.getElementById("message");

    if(otp == generatedOTP){

        document.getElementById("resetSection")
        .classList.remove("hidden");

        message.innerHTML =
        "OTP verified successfully";

        message.className =
        "message success";
    }

    else{

        message.innerHTML =
        "Invalid OTP";

        message.className =
        "message error";
    }
}

function showPassword(){

    var pass =
    document.getElementById("newpass");

    var confirm =
    document.getElementById("confirmpass");

    if(pass.type == "password"){

        pass.type = "text";
        confirm.type = "text";
    }

    else{

        pass.type = "password";
        confirm.type = "password";
    }
}

function resetPassword(){

    var newpass =
    document.getElementById("newpass").value;

    var confirmpass =
    document.getElementById("confirmpass").value;

    var message =
    document.getElementById("message");

    if(newpass == "" || confirmpass == ""){

        message.innerHTML =
        "Fill all password fields";

        message.className =
        "message error";

        return;
    }

    if(newpass != confirmpass){

        message.innerHTML =
        "Passwords do not match";

        message.className =
        "message error";

        return;
    }

    localStorage.setItem(
    "techhivePassword",
    newpass
    );

    message.innerHTML =
    "Password reset successful";

    message.className =
    "message success";

    setTimeout(function(){

        window.location.href =
        "login.html";

    },1500);
}

</script>

</body>
</html>
